services:
  biblioteca:
    build: .
    container_name: gestor-biblioteca
    restart: unless-stopped
    volumes:
      - /volume1/docker/GestorBiblioteca:/app
      - /app/node_modules
      - "/volume3/BIBLIOTECA DIGITAL/Inbox:/app/Inbox"
      - "/volume3/BIBLIOTECA DIGITAL/CDU:/app/CDU"
      - "/volume3/BIBLIOTECA DIGITAL/Cuarentena:/app/Cuarentena"
      - "/volume3/BIBLIOTECA DIGITAL/Reintentos:/app/Reintentos"
      - "/volume3/BIBLIOTECA DIGITAL/Recycling:/app/Recycling"
      - "/volume3/BIBLIOTECA DIGITAL/Fichero:/app/Fichero"
    ports:
      - "3000:3000"
      - "4000:4000"
    # NOTA: las CLAVES de IA (GEMINI_API_FREE_KEY_*, GEMINI_API_KEY_PAID, GROQ_API_KEY_*, OPENROUTER_API_KEY_*,
    # GOOGLE_BOOKS_API_KEY, EUROPEANA_API_KEY…) NO se listan aquí: las lee la app del .env montado en /app
    # (dotenv). Así añadir una clave nueva = editar .env, sin tocar este fichero. Aquí solo van las que deben
    # GANAR sobre el .env (paths a /app) y las pocas que conviene fijar explícitas.
    environment:
      - MONGO_URI=${MONGO_URI}
      - MONGO_DB_NAME=${MONGO_DB_NAME}
      - PATH_INBOX=/app/Inbox
      - PATH_CDU=/app/CDU
      - PATH_CUARENTENA=/app/Cuarentena
      - PATH_REINTENTOS=/app/Reintentos
      - PATH_RECICLAJE=/app/Recycling
      - PATH_FICHERO=/app/Fichero
      - PANEL_PORT=4000
      - ADMIN_PWD=${ADMIN_PWD}
      - GUEST_PWD=${GUEST_PWD:-guest}
      - TZ=${TZ:-Europe/Madrid}
      - NODE_OPTIONS=--max-old-space-size=512 --no-warnings

    working_dir: /app
    command: ["npm", "start"]

